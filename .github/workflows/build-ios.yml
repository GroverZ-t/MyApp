name: Build MAUI iOS IPA

on: [push]

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4

      # 🔧 Устанавливаем .NET (global.json определит точную версию)
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 🔧 Выбираем совместимый Xcode
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          echo "Selected Xcode:"
          xcodebuild -version

      # 🔧 Устанавливаем MAUI workload
      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      # 🔧 Сборка iOS
      - name: Build iOS
        run: |
          # Автоматически находим .csproj файл
          CSPROJ=$(find . -name "*.csproj" -not -path "*/obj/*" -not -path "*/bin/*" | head -n 1)
          echo "Building project: $CSPROJ"
          
          # Собираем только iOS
          dotnet publish "$CSPROJ" \
            -f net8.0-ios \
            -c Release \
            -p:BuildIpa=true \
            -p:ArchiveOnBuild=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:TargetFrameworks=net8.0-ios \
            -p:MauiVersion=8.0.100

      # 🔧 Загружаем артефакт
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: bin/Release/net8.0-ios/ios-arm64/publish/*.ipa
