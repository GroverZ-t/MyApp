name: Build MAUI iOS App Bundle

on: [push]

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          echo "Selected Xcode:"
          xcodebuild -version

      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Build iOS App Bundle Unsigned
        run: |
          CSPROJ=$(find . -name "*.csproj" -not -path "*/obj/*" -not -path "*/bin/*" | head -n 1)
          echo "Building project: $CSPROJ"
          
          dotnet build "$CSPROJ" \
            -f net8.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:BuildIpa=false \
            -p:ArchiveOnBuild=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignEntitlements="" \
            -p:TargetFrameworks=net8.0-ios \
            -p:MauiVersion=8.0.100 \
            -p:EnableCodeSigning=false \
            -p:SkipCodesigning=true \
            -p:ProvisioningProfile=""

      - name: Debug Full Search for Artifacts
        run: |
          echo "=== WORKSPACE ROOT ==="
          pwd
          
          echo "=== Searching ENTIRE workspace for .app ==="
          find . -type d -name "*.app" 2>/dev/null | head -20
          
          echo "=== Searching for .ipa ==="
          find . -name "*.ipa" 2>/dev/null | head -10
          
          echo "=== Searching for .appbundle ==="
          find . -name "*.appbundle" 2>/dev/null | head -10
          
          echo "=== All files in bin/ (recursive, limited) ==="
          find bin -type f 2>/dev/null | head -50
          
          echo "=== All files in obj/ (recursive, limited) ==="
          find obj -type f 2>/dev/null | head -50
          
          echo "=== Directory structure near output ==="
          ls -laR bin/Release/net8.0-ios/ 2>/dev/null | head -100 || echo "Path bin/Release/net8.0-ios/ not found"

      - name: Try Upload Any App-Like Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-output
          # 🔍 Пробуем загрузить всё, что может быть полезным
          path: |
            **/*.app
            **/*.appbundle
            **/*.ipa
            bin/Release/**/publish/**
            obj/Release/**/ios-arm64/**
          if-no-files-found: warn
