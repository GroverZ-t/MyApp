name: Build MAUI iOS IPA

on: [push]

jobs:
  build:
    runs-on: macos-15  # ✅ macOS 15 с Xcode 16+
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 🔧 Показываем доступные версии Xcode
      - name: List Xcode versions
        run: ls -la /Applications/ | grep Xcode

      # 🔧 Выбираем Xcode 16 (или доступную версию)
      - name: Select Xcode
        run: |
          # Пробуем Xcode 16.2, 16.1, 16.0 или любую доступную
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app
          elif [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app
          else
            echo "Available Xcode versions:"
            ls /Applications/ | grep Xcode
            exit 1
          fi
          echo "Selected Xcode:"
          xcodebuild -version

      # 🔧 Устанавливаем MAUI workload
      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Build iOS
        run: |
          CSPROJ=$(find . -name "*.csproj" | head -n 1)
          echo "Building project: $CSPROJ"
          
          dotnet publish "$CSPROJ" \
            -f net9.0-ios \
            -c Release \
            -p:BuildIpa=true \
            -p:ArchiveOnBuild=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:TargetFrameworks=net9.0-ios

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: bin/Release/net9.0-ios/ios-arm64/publish/*.ipa
