name: Build MAUI iOS IPA

on: [push]

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4

      # 🔧 Используем .NET 8 (совместим с Xcode 16.x/26.x)
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 🔧 Выбираем Xcode 16.4 (стабильная версия)
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          echo "Selected Xcode:"
          xcodebuild -version

      # 🔧 Устанавливаем MAUI workload для .NET 8
      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Build iOS
        run: |
          CSPROJ=$(find . -name "*.csproj" | head -n 1)
          echo "Building project: $CSPROJ"
          
          dotnet publish "$CSPROJ" \
            -f net8.0-ios \
            -c Release \
            -p:BuildIpa=true \
            -p:ArchiveOnBuild=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:TargetFrameworks=net8.0-ios

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: bin/Release/net8.0-ios/ios-arm64/publish/*.ipa
