name: Build MAUI iOS App Bundle

on: [push]

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          echo "Selected Xcode:"
          xcodebuild -version

      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Build iOS App Bundle
        run: |
          CSPROJ=$(find . -name "*.csproj" -not -path "*/obj/*" -not -path "*/bin/*" | head -n 1)
          echo "Building project: $CSPROJ"
          
          # 🔧 Собираем .app бандл (без IPA, без подписи)
          dotnet publish "$CSPROJ" \
            -f net8.0-ios \
            -c Release \
            -p:BuildIpa=false \
            -p:ArchiveOnBuild=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:TargetFrameworks=net8.0-ios \
            -p:MauiVersion=8.0.100

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          # 🔧 Путь к .app папке (без подписи)
          path: bin/Release/net8.0-ios/ios-arm64/publish/MyApp.app
