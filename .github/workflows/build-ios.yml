name: Build MAUI iOS IPA

on: [push]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 🔧 Устанавливаем MAUI workload (нужен для сборки)
      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Build iOS
        run: |
          # Находим .csproj файл
          CSPROJ=$(find . -name "*.csproj" | head -n 1)
          echo "Building project: $CSPROJ"
          
          # Собираем ТОЛЬКО для iOS (игнорируем android/maccatalyst)
          dotnet publish "$CSPROJ" \
            -f net9.0-ios \
            -c Release \
            -p:BuildIpa=true \
            -p:ArchiveOnBuild=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:TargetFrameworks=net9.0-ios

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: bin/Release/net9.0-ios/ios-arm64/publish/*.ipa
