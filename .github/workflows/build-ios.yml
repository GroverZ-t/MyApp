name: Build MAUI iOS App Bundle

on: [push]

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          echo "Selected Xcode:"
          xcodebuild -version

      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Build iOS App Bundle Unsigned
        run: |
          CSPROJ=$(find . -name "*.csproj" -not -path "*/obj/*" -not -path "*/bin/*" | head -n 1)
          echo "Building project: $CSPROJ"
          
          dotnet build "$CSPROJ" \
            -f net8.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:BuildIpa=false \
            -p:ArchiveOnBuild=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignEntitlements="" \
            -p:TargetFrameworks=net8.0-ios \
            -p:MauiVersion=8.0.100 \
            -p:EnableCodeSigning=false \
            -p:SkipCodesigning=true \
            -p:ProvisioningProfile=""

      - name: Debug Find app bundle
        run: |
          echo "=== Current directory ==="
          pwd
          
          echo "=== Searching for .app files ==="
          find . -name "*.app" -type d 2>/dev/null || echo "No .app found with find"
          
          echo "=== Checking common output paths ==="
          ls -la bin/Release/net8.0-ios/ 2>/dev/null || echo "Path not found: bin/Release/net8.0-ios/"
          ls -la bin/Release/net8.0-ios/ios-arm64/ 2>/dev/null || echo "Path not found: ios-arm64"
          ls -la bin/Release/net8.0-ios/ios-arm64/publish/ 2>/dev/null || echo "Path not found: publish"
          
          echo "=== Full directory tree limited ==="
          find bin -name "*.app" -type d 2>/dev/null | head -20

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: bin/**/*.app
