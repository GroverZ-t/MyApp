name: Build MAUI iOS IPA

on: [push]

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 🔧 Выбираем Xcode 26.3 (максимальная доступная версия)
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          echo "Selected Xcode:"
          xcodebuild -version

      # 🔧 Устанавливаем MAUI workload
      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Build iOS
        run: |
          CSPROJ=$(find . -name "*.csproj" | head -n 1)
          echo "Building project: $CSPROJ"
          
          dotnet publish "$CSPROJ" \
            -f net9.0-ios \
            -c Release \
            -p:BuildIpa=true \
            -p:ArchiveOnBuild=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:TargetFrameworks=net9.0-ios \
            -p:IPhoneSdkVersion=26.3 \
            -p:_DotNetInstallDir=/Users/runner/.dotnet

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: bin/Release/net9.0-ios/ios-arm64/publish/*.ipa
