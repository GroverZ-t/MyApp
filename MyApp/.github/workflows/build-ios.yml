name: Build MAUI iOS IPA (Free)

on: [push]

jobs:
  build:
    runs-on: macos-14  # ✅ macOS 14 (Sonoma) нужен для iOS 17/18 SDK и .NET 9
    
    steps:
      - uses: actions/checkout@v4

      # ✅ 1. Устанавливаем .NET 9 SDK
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ✅ 2. Выбираем Xcode 16 (нужен для iOS 18)
      # Если возникнет ошибка, попробуйте /Applications/Xcode_15.4.app
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      # ✅ 3. Сборка IPA для .NET 9
      - name: Publish IPA
        run: |
          dotnet publish MyApp.csproj `
            -f net9.0-ios `
            -c Release `
            -p:BuildIpa=true `
            -p:ArchiveOnBuild=false `
            -p:CodesignKey="" `
            -p:CodesignProvision=""

      # ✅ 4. Загрузка артефакта (путь обновлён под net9.0-ios)
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: bin/Release/net9.0-ios/ios-arm64/publish/*.ipa